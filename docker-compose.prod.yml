# ================================================================
#  Production compose — use this on VPS instead of docker-compose.yml
#  Run: docker compose -f docker-compose.prod.yml up -d --build
#  No bind mounts. Code baked into images. No hot reload.
# ================================================================

services:

  db:
    image: mysql:8.0
    container_name: igtaccount_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - igtaccount_mysql_data:/var/lib/mysql
    networks:
      - igtaccount-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: igtaccount_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "mysql://${DB_USER}:${DB_PASSWORD}@db:3306/${DB_NAME}"
      NODE_ENV: production
      PORT: 5000
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - igtaccount-network
    command: >
      sh -c "
        npx prisma migrate deploy &&
        node dist/index.js
      "
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:5000/',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: igtaccount_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - igtaccount-network

volumes:
  igtaccount_mysql_data:
    driver: local

networks:
  igtaccount-network:
    driver: bridge
